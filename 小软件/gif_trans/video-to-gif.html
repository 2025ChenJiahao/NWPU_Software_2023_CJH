<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频转GIF</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 20px;
  }
  .container {
    max-width: 1200px;
    margin: 0 auto;
  }
  h1 {
    text-align: center;
    font-size: 32px;
    margin-bottom: 20px;
    background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
  }
  .main-content {
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 20px;
  }
  .panel {
    background: #16213e;
    border-radius: 12px;
    padding: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .panel h3 {
    font-size: 14px;
    color: #888;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 1px solid #333;
    padding-bottom: 8px;
  }
  .upload-zone {
    border: 2px dashed #48dbfb;
    border-radius: 12px;
    padding: 30px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    background: rgba(72, 219, 251, 0.05);
    margin-bottom: 15px;
  }
  .upload-zone:hover {
    background: rgba(72, 219, 251, 0.1);
    border-color: #ff6b6b;
  }
  .upload-zone.dragover {
    background: rgba(72, 219, 251, 0.2);
    border-color: #feca57;
  }
  .upload-icon {
    font-size: 48px;
    margin-bottom: 10px;
  }
  .upload-text {
    font-size: 16px;
    color: #aaa;
  }
  .upload-hint {
    font-size: 12px;
    color: #666;
    margin-top: 8px;
  }
  .file-list {
    max-height: 200px;
    overflow-y: auto;
  }
  .file-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px;
    background: #0f3460;
    border-radius: 6px;
    margin-bottom: 6px;
    font-size: 13px;
  }
  .file-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-right: 10px;
  }
  .file-size {
    color: #666;
    font-size: 11px;
    margin-right: 10px;
  }
  .file-status {
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
  }
  .status-waiting { background: #333; color: #aaa; }
  .status-converting { background: #1a5276; color: #48dbfb; }
  .status-done { background: #1e8449; color: #82e0aa; }
  .status-error { background: #922b21; color: #f1948a; }
  .remove-btn {
    background: none;
    border: none;
    color: #ff6b6b;
    cursor: pointer;
    font-size: 16px;
    padding: 0 5px;
  }
  .settings-grid {
    display: grid;
    gap: 12px;
  }
  .setting-item {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .setting-item label {
    font-size: 13px;
    color: #aaa;
  }
  .setting-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  input[type="number"], input[type="text"], select {
    width: 100%;
    padding: 8px 10px;
    background: #0f3460;
    border: 1px solid #333;
    border-radius: 6px;
    color: #e0e0e0;
    font-size: 13px;
  }
  input[type="range"] {
    width: 100%;
    accent-color: #48dbfb;
  }
  .range-value {
    font-size: 12px;
    color: #48dbfb;
    min-width: 30px;
    text-align: right;
  }
  .time-inputs {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .time-inputs input {
    width: 80px;
    text-align: center;
  }
  .time-separator {
    color: #666;
  }
  .btn {
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn-primary {
    background: linear-gradient(135deg, #48dbfb, #0abde3);
    color: #1a1a2e;
    font-weight: bold;
  }
  .btn-primary:hover {
    background: linear-gradient(135deg, #0abde3, #48dbfb);
    transform: translateY(-1px);
  }
  .btn-primary:disabled {
    background: #333;
    color: #666;
    cursor: not-allowed;
    transform: none;
  }
  .btn-secondary {
    background: #0f3460;
    color: #e0e0e0;
    border: 1px solid #333;
  }
  .btn-secondary:hover {
    background: #1a5276;
  }
  .btn-danger {
    background: #641e16;
    color: #e0e0e0;
  }
  .btn-danger:hover {
    background: #922b21;
  }
  .btn-success {
    background: #1e8449;
    color: #fff;
  }
  .btn-success:hover {
    background: #27ae60;
  }
  .btn-block {
    width: 100%;
  }
  .btn-group {
    display: flex;
    gap: 8px;
    margin-top: 15px;
  }
  .right-panel {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .preview-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 300px;
  }
  .preview-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 300px;
    color: #666;
  }
  .preview-placeholder .icon {
    font-size: 64px;
    margin-bottom: 10px;
  }
  #gifPreview {
    max-width: 100%;
    max-height: 400px;
    border-radius: 8px;
    border: 2px solid #333;
  }
  .preview-info {
    display: flex;
    gap: 20px;
    margin-top: 10px;
    font-size: 13px;
    color: #aaa;
  }
  .preview-actions {
    display: flex;
    gap: 10px;
    margin-top: 15px;
  }
  .progress-container {
    margin-top: 15px;
  }
  .progress-bar {
    height: 8px;
    background: #0f3460;
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #48dbfb, #ff6b6b);
    border-radius: 4px;
    transition: width 0.3s;
    width: 0%;
  }
  .progress-text {
    font-size: 12px;
    color: #aaa;
    margin-top: 5px;
    text-align: center;
  }
  @media (max-width: 768px) {
    .main-content {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>

<div class="container">
  <h1>视频转GIF</h1>

  <div class="main-content">
    <div class="left-panel">
      <div class="panel">
        <h3>上传视频</h3>
        <div class="upload-zone" id="uploadZone">
          <div class="upload-icon">📁</div>
          <div class="upload-text">拖拽视频到这里</div>
          <div class="upload-hint">或点击选择文件</div>
          <input type="file" id="fileInput" accept="video/*" multiple style="display:none">
        </div>
        <div class="file-list" id="fileList"></div>
      </div>

      <div class="panel" style="margin-top: 15px;">
        <h3>GIF设置</h3>
        <div class="settings-grid">
          <div class="setting-item">
            <label>帧率 (FPS)</label>
            <div class="setting-row">
              <input type="range" id="fpsSlider" min="1" max="30" value="10">
              <span class="range-value" id="fpsValue">10</span>
            </div>
          </div>

          <div class="setting-item">
            <label>宽度 (px)</label>
            <input type="number" id="widthInput" value="480" min="50" max="1920">
          </div>

          <div class="setting-item">
            <label>高度 (px)</label>
            <div class="setting-row">
              <input type="number" id="heightInput" value="0" min="0" max="1080" placeholder="0=自动">
              <label><input type="checkbox" id="keepRatio" checked> 保持比例</label>
            </div>
          </div>

          <div class="setting-item">
            <label>质量</label>
            <select id="qualitySelect">
              <option value="10">低质量 (小文件)</option>
              <option value="5" selected>中等质量</option>
              <option value="1">高质量 (大文件)</option>
            </select>
          </div>

          <div class="setting-item">
            <label>时间裁剪 (秒)</label>
            <div class="time-inputs">
              <input type="number" id="startTime" value="0" min="0" step="0.1" placeholder="开始">
              <span class="time-separator">-</span>
              <input type="number" id="endTime" value="0" min="0" step="0.1" placeholder="结束">
            </div>
            <div style="font-size:11px;color:#666;">留空=完整视频</div>
          </div>
        </div>

        <div class="btn-group">
          <button class="btn btn-primary btn-block" id="convertBtn" disabled>
            🎬 开始转换
          </button>
        </div>
        <div class="btn-group">
          <button class="btn btn-secondary btn-block" id="convertAllBtn" disabled>
            📦 批量转换全部
          </button>
        </div>
        <div class="btn-group">
          <button class="btn btn-danger btn-block" id="clearAllBtn">
            🗑️ 清空列表
          </button>
        </div>
      </div>
    </div>

    <div class="right-panel">
      <div class="panel">
        <h3>GIF预览</h3>
        <div class="preview-container" id="previewContainer">
          <div class="preview-placeholder">
            <div class="icon">🎬</div>
            <div>上传视频后开始转换</div>
          </div>
        </div>
        <div class="progress-container" id="progressContainer" style="display:none;">
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="progress-text" id="progressText">准备中...</div>
        </div>
        <div class="preview-actions" id="previewActions" style="display:none;">
          <button class="btn btn-success" id="downloadBtn">
            💾 下载GIF
          </button>
          <button class="btn btn-secondary" id="copyBtn">
            📋 复制到剪贴板
          </button>
        </div>
      </div>

      <div class="panel" id="batchPanel" style="display:none;">
        <h3>批量转换结果</h3>
        <div id="batchResults"></div>
        <div class="btn-group">
          <button class="btn btn-success btn-block" id="downloadAllBtn">
            💾 下载全部GIF
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 隐藏的 video 和 canvas 元素 -->
<video id="videoEl" style="display:none" muted></video>
<canvas id="canvasEl" style="display:none"></canvas>

<script src="gifjs/gif.js"></script>

<script>
let files = [];
let currentGifUrl = null;
let currentGifBlob = null;
let workerBlobUrl = null;

document.addEventListener('DOMContentLoaded', async () => {
  // 从内嵌 script 标签获取 worker 代码，创建 Blob URL（兼容 file://）
  const workerCode = document.getElementById('gifWorkerCode').textContent;
  workerBlobUrl = URL.createObjectURL(new Blob([workerCode], { type: 'application/javascript' }));
  setupEventListeners();
});

function setupEventListeners() {
  const uploadZone = document.getElementById('uploadZone');
  const fileInput = document.getElementById('fileInput');
  const fpsSlider = document.getElementById('fpsSlider');

  uploadZone.addEventListener('click', () => fileInput.click());
  uploadZone.addEventListener('dragover', handleDragOver);
  uploadZone.addEventListener('dragleave', handleDragLeave);
  uploadZone.addEventListener('drop', handleDrop);
  fileInput.addEventListener('change', handleFileSelect);

  fpsSlider.addEventListener('input', () => {
    document.getElementById('fpsValue').textContent = fpsSlider.value;
  });

  document.getElementById('convertBtn').addEventListener('click', convertCurrent);
  document.getElementById('convertAllBtn').addEventListener('click', convertAll);
  document.getElementById('clearAllBtn').addEventListener('click', clearAll);
  document.getElementById('downloadBtn').addEventListener('click', downloadGif);
  document.getElementById('copyBtn').addEventListener('click', copyToClipboard);
  document.getElementById('downloadAllBtn').addEventListener('click', downloadAll);
}

function handleDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('dragover');
}

function handleDragLeave(e) {
  e.currentTarget.classList.remove('dragover');
}

function handleDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('dragover');
  const droppedFiles = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('video/'));
  addFiles(droppedFiles);
}

function handleFileSelect(e) {
  const selectedFiles = Array.from(e.target.files).filter(f => f.type.startsWith('video/'));
  addFiles(selectedFiles);
  e.target.value = '';
}

function addFiles(newFiles) {
  newFiles.forEach(file => {
    files.push({
      file: file,
      id: Date.now() + Math.random(),
      status: 'waiting',
      gifUrl: null
    });
  });
  renderFileList();
  updateButtons();
}

function renderFileList() {
  const fileList = document.getElementById('fileList');
  fileList.innerHTML = files.map(f => `
    <div class="file-item" data-id="${f.id}">
      <span class="file-name">${f.file.name}</span>
      <span class="file-size">${formatSize(f.file.size)}</span>
      <span class="file-status status-${f.status}">${getStatusText(f.status)}</span>
      <button class="remove-btn" onclick="removeFile('${f.id}')">×</button>
    </div>
  `).join('');
}

function getStatusText(status) {
  const map = { waiting: '等待', converting: '转换中', done: '完成', error: '错误' };
  return map[status] || status;
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function removeFile(id) {
  files = files.filter(f => f.id != id);
  renderFileList();
  updateButtons();
}

function clearAll() {
  files = [];
  renderFileList();
  updateButtons();
  hidePreview();
}

function updateButtons() {
  const hasFiles = files.length > 0;
  const hasWaiting = files.some(f => f.status === 'waiting');
  document.getElementById('convertBtn').disabled = !hasFiles;
  document.getElementById('convertAllBtn').disabled = !hasWaiting;
}

async function convertCurrent() {
  const file = files.find(f => f.status === 'waiting');
  if (!file) return;
  await convertFile(file);
}

async function convertAll() {
  for (const file of files) {
    if (file.status === 'waiting') {
      await convertFile(file);
    }
  }
}

function seekVideo(video, time) {
  return new Promise(resolve => {
    const onSeeked = () => { video.removeEventListener('seeked', onSeeked); resolve(); };
    video.addEventListener('seeked', onSeeked);
    video.currentTime = time;
  });
}

function loadVideoMetadata(video, url) {
  return new Promise((resolve, reject) => {
    video.onloadedmetadata = () => resolve();
    video.onerror = () => reject(new Error('无法加载视频'));
    video.src = url;
  });
}

async function convertFile(fileObj) {
  fileObj.status = 'converting';
  renderFileList();
  showProgress();

  try {
    const video = document.getElementById('videoEl');
    const canvas = document.getElementById('canvasEl');
    const ctx = canvas.getContext('2d');

    const url = URL.createObjectURL(fileObj.file);
    await loadVideoMetadata(video, url);

    const fps = parseInt(document.getElementById('fpsSlider').value);
    const targetWidth = parseInt(document.getElementById('widthInput').value) || 480;
    const targetHeight = parseInt(document.getElementById('heightInput').value) || 0;
    const quality = parseInt(document.getElementById('qualitySelect').value);
    const startTime = parseFloat(document.getElementById('startTime').value) || 0;
    const endTime = parseFloat(document.getElementById('endTime').value) || video.duration;

    // 计算尺寸
    const ratio = video.videoHeight / video.videoWidth;
    const w = targetWidth;
    const h = targetHeight || Math.round(targetWidth * ratio);
    canvas.width = w;
    canvas.height = h;

    // 创建 GIF 编码器
    const gif = new GIF({
      workers: 2,
      quality: quality,
      width: w,
      height: h,
      workerScript: workerBlobUrl,
    });

    gif.on('finished', function(blob) {
      const gifUrl = URL.createObjectURL(blob);
      fileObj.status = 'done';
      fileObj.gifUrl = gifUrl;
      fileObj.gifBlob = blob;
      URL.revokeObjectURL(url);
      renderFileList();
      showPreview(gifUrl, blob);
      hideProgress();
    });

    gif.on('progress', function(p) {
      updateProgress(Math.round(p * 100));
    });

    // 逐帧采集
    const frameInterval = 1 / fps;
    const totalFrames = Math.floor((endTime - startTime) * fps);

    for (let i = 0; i < totalFrames; i++) {
      const t = startTime + i * frameInterval;
      await seekVideo(video, t);
      ctx.drawImage(video, 0, 0, w, h);
      gif.addFrame(ctx, { copy: true, delay: frameInterval * 1000 });
      updateProgress(Math.round((i / totalFrames) * 50)); // 前50%是采集
    }

    gif.render();

  } catch (err) {
    console.error('转换失败:', err);
    fileObj.status = 'error';
    renderFileList();
    hideProgress();
    alert('转换失败: ' + err.message);
  }
}

function showProgress() {
  document.getElementById('progressContainer').style.display = 'block';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('progressText').textContent = '准备中...';
}

function hideProgress() {
  document.getElementById('progressContainer').style.display = 'none';
}

function updateProgress(percent) {
  document.getElementById('progressFill').style.width = percent + '%';
  document.getElementById('progressText').textContent = `转换中 ${percent}%`;
}

function showPreview(url, blob) {
  currentGifUrl = url;
  currentGifBlob = blob;

  const container = document.getElementById('previewContainer');
  container.innerHTML = `<img id="gifPreview" src="${url}" alt="GIF预览">`;

  const img = document.getElementById('gifPreview');
  img.onload = () => {
    document.getElementById('previewActions').style.display = 'flex';
    document.querySelector('.preview-container').insertAdjacentHTML('beforeend', `
      <div class="preview-info">
        <span>尺寸: ${img.naturalWidth} × ${img.naturalHeight}</span>
        <span>大小: ${formatSize(blob.size)}</span>
      </div>
    `);
  };
}

function hidePreview() {
  currentGifUrl = null;
  currentGifBlob = null;
  document.getElementById('previewContainer').innerHTML = `
    <div class="preview-placeholder">
      <div class="icon">🎬</div>
      <div>上传视频后开始转换</div>
    </div>
  `;
  document.getElementById('previewActions').style.display = 'none';
}

function downloadGif() {
  if (!currentGifBlob) return;
  const a = document.createElement('a');
  a.href = currentGifUrl;
  a.download = 'converted.gif';
  a.click();
}

async function copyToClipboard() {
  if (!currentGifBlob) return;
  try {
    await navigator.clipboard.write([
      new ClipboardItem({ 'image/gif': currentGifBlob })
    ]);
    alert('已复制到剪贴板');
  } catch (err) {
    alert('复制失败: ' + err.message);
  }
}

function downloadAll() {
  files.forEach(f => {
    if (f.status === 'done' && f.gifUrl) {
      const a = document.createElement('a');
      a.href = f.gifUrl;
      a.download = f.file.name.replace(/\.[^/.]+$/, '') + '.gif';
      a.click();
    }
  });
}
</script>
