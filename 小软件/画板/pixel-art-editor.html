<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>像素画编辑器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    user-select: none;
  }
  h1 {
    font-size: 28px;
    margin-bottom: 6px;
    background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
  }
  .subtitle { font-size: 13px; color: #666; margin-bottom: 20px; }
  .app {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
  }
  .panel {
    background: #16213e;
    border-radius: 12px;
    padding: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .panel h3 {
    font-size: 14px;
    color: #888;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  /* 工具栏 */
  .tools-panel { width: 160px; }
  .tool-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 10px 12px;
    margin-bottom: 6px;
    background: #0f3460;
    border: 2px solid transparent;
    border-radius: 8px;
    color: #e0e0e0;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tool-btn:hover { background: #1a5276; }
  .tool-btn.active { border-color: #48dbfb; background: #1a5276; }
  .tool-icon { font-size: 18px; width: 24px; text-align: center; }
  /* 颜色面板 */
  .colors-panel { width: 200px; }
  .current-color-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .current-color-preview {
    width: 48px; height: 48px;
    border-radius: 8px;
    border: 3px solid #333;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .current-color-preview input[type="color"] {
    position: absolute;
    width: 200%; height: 200%;
    top: -50%; left: -50%;
    cursor: pointer;
    opacity: 0;
  }
  .current-hex {
    font-family: "Consolas", monospace;
    font-size: 14px;
    color: #aaa;
  }
  .color-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 4px;
  }
  .color-swatch {
    width: 26px; height: 26px;
    border-radius: 4px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.15s;
  }
  .color-swatch:hover { transform: scale(1.2); z-index: 1; }
  .color-swatch.active { border-color: #fff; box-shadow: 0 0 6px rgba(255,255,255,0.5); }
  .color-swatch.transparent-bg {
    background: linear-gradient(45deg, #ccc 25%, transparent 25%, transparent 75%, #ccc 75%),
                linear-gradient(45deg, #ccc 25%, transparent 25%, transparent 75%, #ccc 75%);
    background-size: 8px 8px;
    background-position: 0 0, 4px 4px;
  }
  /* 画布 */
  .canvas-panel { display: flex; flex-direction: column; align-items: center; }
  .canvas-viewport {
    width: 512px;
    height: 512px;
    overflow: hidden;
    border: 2px solid #333;
    border-radius: 8px;
    position: relative;
    background-image:
      linear-gradient(45deg, #2a2a3e 25%, transparent 25%, transparent 75%, #2a2a3e 75%),
      linear-gradient(45deg, #2a2a3e 25%, transparent 25%, transparent 75%, #2a2a3e 75%);
    background-size: 20px 20px;
    background-position: 0 0, 10px 10px;
    background-color: #22223a;
    cursor: crosshair;
  }
  .canvas-viewport.panning { cursor: grab; }
  .canvas-viewport.panning:active { cursor: grabbing; }
  .canvas-container {
    position: absolute;
    top: 0; left: 0;
    transform-origin: 0 0;
  }
  canvas#pixelCanvas {
    display: block;
    image-rendering: pixelated;
  }
  canvas#gridOverlay {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
  }
  .canvas-info {
    margin-top: 10px;
    font-size: 12px;
    color: #666;
  }
  /* 设置面板 */
  .settings-panel { width: 160px; }
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .setting-row label { font-size: 13px; color: #aaa; }
  .setting-row input[type="number"] {
    width: 54px;
    padding: 4px 6px;
    background: #0f3460;
    border: 1px solid #333;
    border-radius: 4px;
    color: #e0e0e0;
    font-size: 13px;
    text-align: center;
  }
  .setting-row input[type="checkbox"] {
    width: 16px; height: 16px;
    accent-color: #48dbfb;
  }
  .action-btn {
    width: 100%;
    padding: 8px;
    margin-top: 6px;
    background: #0f3460;
    border: 1px solid #333;
    border-radius: 6px;
    color: #e0e0e0;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .action-btn:hover { background: #1a5276; }
  .action-btn.danger { background: #641e16; }
  .action-btn.danger:hover { background: #922b21; }
  .action-btn.primary { background: #1a5276; border-color: #48dbfb; }
  .action-btn.primary:hover { background: #2471a3; }
  /* 历史记录 */
  .history-panel { width: 160px; }
  .history-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 36px; height: 36px;
    margin: 2px;
    background: #0f3460;
    border: 1px solid #333;
    border-radius: 6px;
    color: #e0e0e0;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .history-btn:hover { background: #1a5276; }
  .history-btn:disabled { opacity: 0.3; cursor: default; }
  /* 缩放 */
  .zoom-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .zoom-btn {
    width: 30px; height: 30px;
    background: #0f3460;
    border: 1px solid #333;
    border-radius: 4px;
    color: #e0e0e0;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .zoom-btn:hover { background: #1a5276; }
  .zoom-label { font-size: 13px; color: #aaa; min-width: 40px; text-align: center; }
  /* 预设尺寸 */
  .preset-row { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px; }
  .preset-btn {
    padding: 4px 8px;
    background: #0f3460;
    border: 1px solid #333;
    border-radius: 4px;
    color: #aaa;
    font-size: 11px;
    cursor: pointer;
  }
  .preset-btn:hover { background: #1a5276; color: #e0e0e0; }

  /* 陪伴精灵 */
  .companion-sprite {
    position: fixed;
    width: 48px;
    height: 48px;
    z-index: 9999;
    cursor: pointer;
    pointer-events: auto;
    transition: none;
    image-rendering: pixelated;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
  }
  .companion-sprite:hover {
    filter: drop-shadow(0 2px 10px rgba(72,219,251,0.6));
  }
  .sprite-body {
    width: 100%;
    height: 100%;
    position: relative;
    animation: sprite-bob 2s ease-in-out infinite;
  }
  .sprite-body.dragging { animation: none; }

  /* 像素精灵绘制 */
  .sprite-pixel {
    position: absolute;
    image-rendering: pixelated;
  }

  @keyframes sprite-bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .sprite-speech {
    position: absolute;
    bottom: 54px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(22, 33, 62, 0.95);
    color: #e0e0e0;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 10px;
    border: 1px solid #333;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    font-family: "Microsoft YaHei", sans-serif;
  }
  .sprite-speech.show { opacity: 1; }
  .sprite-speech::after {
    content: '';
    position: absolute;
    bottom: -6px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-top: 6px solid rgba(22, 33, 62, 0.95);
  }

  /* 粒子特效 */
  .sprite-particle {
    position: fixed;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    animation: particle-fade 0.8s ease-out forwards;
  }
  @keyframes particle-fade {
    0% { opacity: 1; transform: translate(0, 0) scale(1); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
  }

  /* 精灵右键菜单 */
  .sprite-menu {
    position: absolute;
    bottom: 56px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(22, 33, 62, 0.97);
    border: 1px solid #48dbfb;
    border-radius: 10px;
    padding: 6px 0;
    display: none;
    z-index: 10000;
    min-width: 120px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .sprite-menu.show { display: block; }
  .sprite-menu-item {
    padding: 8px 16px;
    font-size: 13px;
    color: #e0e0e0;
    cursor: pointer;
    white-space: nowrap;
    font-family: "Microsoft YaHei", sans-serif;
  }
  .sprite-menu-item:hover {
    background: rgba(72, 219, 251, 0.15);
    color: #48dbfb;
  }

  /* 恐龙游戏覆盖层 */
  .dino-game-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(10, 10, 20, 0.92);
    z-index: 10001;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .dino-game-overlay.show { display: flex; }
  .dino-game-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 12px;
  }
  .dino-game-title {
    font-size: 20px;
    color: #48dbfb;
    font-weight: bold;
    letter-spacing: 2px;
  }
  .dino-back-btn {
    padding: 6px 18px;
    background: #0f3460;
    border: 1px solid #48dbfb;
    border-radius: 6px;
    color: #48dbfb;
    font-size: 13px;
    cursor: pointer;
    font-family: "Microsoft YaHei", sans-serif;
    transition: all 0.15s;
  }
  .dino-back-btn:hover { background: #1a5276; }
  .dino-canvas-wrap {
    border: 2px solid #333;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 4px 30px rgba(0,0,0,0.5);
  }
  canvas#dinoCanvas {
    display: block;
    background: #1a1a2e;
    image-rendering: pixelated;
  }
  .dino-score {
    margin-top: 10px;
    font-size: 14px;
    color: #888;
    font-family: "Consolas", monospace;
  }
  .dino-hint {
    margin-top: 6px;
    font-size: 12px;
    color: #555;
  }
</style>
</head>
<body>

<h1>Pixel Art Editor</h1>
<p class="subtitle">像素画编辑器 &mdash; 画出你的像素世界</p>

<div class="app">
  <!-- 左侧工具 -->
  <div class="panel tools-panel">
    <h3>工具</h3>
    <button class="tool-btn active" data-tool="pencil" title="画笔 (B)">
      <span class="tool-icon">&#9998;</span> 画笔
    </button>
    <button class="tool-btn" data-tool="eraser" title="橡皮擦 (E)">
      <span class="tool-icon">&#9003;</span> 橡皮擦
    </button>
    <button class="tool-btn" data-tool="fill" title="油漆桶 (G)">
      <span class="tool-icon">&#9632;</span> 油漆桶
    </button>
    <button class="tool-btn" data-tool="picker" title="吸管 (I)">
      <span class="tool-icon">&#128065;</span> 吸管
    </button>
    <button class="tool-btn" data-tool="line" title="直线 (L)">
      <span class="tool-icon">&#47;</span> 直线
    </button>
    <button class="tool-btn" data-tool="rect" title="矩形 (R)">
      <span class="tool-icon">&#9634;</span> 矩形
    </button>
    <button class="tool-btn" data-tool="circle" title="圆形 (C)">
      <span class="tool-icon">&#9675;</span> 圆形
    </button>
  </div>

  <!-- 画布 -->
  <div class="panel canvas-panel">
    <div class="canvas-viewport" id="canvasViewport">
      <div class="canvas-container" id="canvasContainer">
        <canvas id="pixelCanvas"></canvas>
        <canvas id="gridOverlay"></canvas>
      </div>
    </div>
    <div class="canvas-info" id="canvasInfo">32 &times; 32 &mdash; 像素: 16x &mdash; 视图: 100%</div>
  </div>

  <!-- 颜色 -->
  <div class="panel colors-panel">
    <h3>颜色</h3>
    <div class="current-color-row">
      <div class="current-color-preview" id="currentColorPreview">
        <input type="color" id="colorPicker" value="#48dbfb">
      </div>
      <div>
        <div class="current-hex" id="currentColorHex">#48dbfb</div>
        <div style="font-size:11px;color:#555;margin-top:2px;">点击选色</div>
      </div>
    </div>
    <div class="color-grid" id="colorGrid"></div>
  </div>

  <!-- 设置 -->
  <div class="panel settings-panel">
    <h3>画布</h3>
    <div class="preset-row">
      <button class="preset-btn" data-size="8">8x8</button>
      <button class="preset-btn" data-size="16">16x16</button>
      <button class="preset-btn active" data-size="32">32x32</button>
      <button class="preset-btn" data-size="64">64x64</button>
    </div>
    <div class="setting-row">
      <label>宽度</label>
      <input type="number" id="canvasWidth" min="4" max="128" value="32">
    </div>
    <div class="setting-row">
      <label>高度</label>
      <input type="number" id="canvasHeight" min="4" max="128" value="32">
    </div>
    <button class="action-btn primary" id="resizeBtn">调整画布</button>

    <h3 style="margin-top:14px;">选项</h3>
    <div class="setting-row">
      <label>显示网格</label>
      <input type="checkbox" id="showGrid" checked>
    </div>

    <h3 style="margin-top:14px;">操作</h3>
    <button class="action-btn" id="clearBtn">清空画布</button>
    <button class="action-btn" id="exportBtn" style="margin-top:6px;">导出 PNG</button>
    <button class="action-btn" id="exportScaledBtn">导出 4x PNG</button>
    <button class="action-btn danger" id="undoAllBtn" style="margin-top:6px;">撤销全部</button>
  </div>

  <!-- 历史 -->
  <div class="panel history-panel">
    <h3>历史</h3>
    <div>
      <button class="history-btn" id="undoBtn" title="撤销 (Ctrl+Z)" disabled>&#8630;</button>
      <button class="history-btn" id="redoBtn" title="重做 (Ctrl+Y)" disabled>&#8631;</button>
    </div>
    <div style="margin-top:10px;font-size:12px;color:#555;" id="historyInfo">0 步</div>
  </div>
</div>

<!-- 陪伴精灵 -->
<div class="companion-sprite" id="companionSprite">
  <div class="sprite-speech" id="spriteSpeech"></div>
  <div class="sprite-menu" id="spriteMenu">
    <div class="sprite-menu-item" id="menuDino">🦕 玩小游戏</div>
  </div>
  <canvas class="sprite-body" id="spriteCanvas" width="48" height="48"></canvas>
</div>

<!-- 恐龙游戏 -->
<div class="dino-game-overlay" id="dinoGameOverlay">
  <div class="dino-game-header">
    <span class="dino-game-title">🦕 恐龙快跑</span>
    <button class="dino-back-btn" id="dinoBackBtn">返回画板</button>
  </div>
  <div class="dino-canvas-wrap">
    <canvas id="dinoCanvas" width="600" height="200"></canvas>
  </div>
  <div class="dino-score" id="dinoScore">得分: 0 &nbsp;|&nbsp; 最高: 0</div>
  <div class="dino-hint">空格/点击 跳跃 &nbsp;|&nbsp; 再按空格重新开始</div>
</div>

<script>
// ===== 状态 =====
const state = {
  width: 32,
  height: 32,
  pixelSize: 16,
  tool: 'pencil',
  color: '#48dbfb',
  showGrid: true,
  drawing: false,
  pixels: [],
  history: [],
  historyIndex: -1,
  maxHistory: 100,
  // 形状工具的起点
  shapeStart: null,
  // 临时画布（用于预览形状）
  tempPixels: null,
  // 视图缩放/平移
  viewZoom: 1,       // CSS transform scale
  viewPanX: 0,       // CSS transform translateX (px)
  viewPanY: 0,       // CSS transform translateY (px)
  isPanning: false,
  panStartX: 0,
  panStartY: 0,
  panStartPanX: 0,
  panStartPanY: 0,
};

// ===== 预设颜色 =====
const PALETTE = [
  // Row 1: 基础色
  '#000000','#434343','#666666','#999999','#cccccc','#ffffff',
  // Row 2: 暖色
  '#ff0000','#ff4444','#ff6b6b','#ff9999','#ffcccc','#ffe6e6',
  // Row 3: 橙黄
  '#ff6600','#ff8c1a','#ffad33','#ffc266','#ffd699','#ffebcc',
  // Row 4: 黄色
  '#ffcc00','#ffd633','#ffe066','#ffeb99','#fff5cc','#fffff0',
  // Row 5: 绿色
  '#00cc00','#33d633','#66e066','#99eb99','#ccf5cc','#f0fff0',
  // Row 6: 青色
  '#00cccc','#33d6d6','#66e0e0','#99ebeb','#ccf5f5','#f0ffff',
  // Row 7: 蓝色
  '#0066ff','#1a75ff','#4d94ff','#80b3ff','#b3d1ff','#e6f0ff',
  // Row 8: 紫色
  '#9900cc','#a833d6','#b866e0','#cc99eb','#e0ccf5','#f5f0ff',
  // Row 9: 粉色
  '#cc0066','#d63385','#e066a3','#eb99c1','#f5ccde','#fff0f5',
  // Row 10: 棕色
  '#663300','#80401a','#996633','#b38866','#ccaa99','#e6d5cc',
  // Row 11: 特殊
  '#feca57','#48dbfb','#ff9ff3','#54a0ff','#5f27cd','#01a3a4',
  // Row 12: 游戏常用
  '#e74c3c','#e67e22','#2ecc71','#3498db','#9b59b6','#1abc9c',
];

// ===== 初始化画布 =====
const canvas = document.getElementById('pixelCanvas');
const ctx = canvas.getContext('2d');
const gridCanvas = document.getElementById('gridOverlay');
const gridCtx = gridCanvas.getContext('2d');

function initPixels() {
  state.pixels = [];
  for (let y = 0; y < state.height; y++) {
    state.pixels[y] = [];
    for (let x = 0; x < state.width; x++) {
      state.pixels[y][x] = null; // null = 透明
    }
  }
}

function resizeCanvas() {
  canvas.width = state.width * state.pixelSize;
  canvas.height = state.height * state.pixelSize;
  gridCanvas.width = canvas.width;
  gridCanvas.height = canvas.height;
  document.getElementById('canvasContainer').style.width = canvas.width + 'px';
  document.getElementById('canvasContainer').style.height = canvas.height + 'px';
  centerView();
}

// ===== 视图缩放/平移 =====
const viewport = document.getElementById('canvasViewport');
const container = document.getElementById('canvasContainer');

function applyViewTransform() {
  container.style.transform = `translate(${state.viewPanX}px, ${state.viewPanY}px) scale(${state.viewZoom})`;
}

function centerView() {
  const vpW = viewport.clientWidth;
  const vpH = viewport.clientHeight;
  const cW = canvas.width;
  const cH = canvas.height;
  state.viewZoom = 1;
  state.viewPanX = Math.floor((vpW - cW) / 2);
  state.viewPanY = Math.floor((vpH - cH) / 2);
  applyViewTransform();
}

function zoomAtPoint(newZoom, screenX, screenY) {
  newZoom = Math.max(0.1, Math.min(20, newZoom));
  const rect = viewport.getBoundingClientRect();
  // 鼠标在 viewport 内的坐标
  const mx = screenX - rect.left;
  const my = screenY - rect.top;
  // 鼠标在当前 canvas 内容上的坐标（考虑平移和缩放）
  const canvasX = (mx - state.viewPanX) / state.viewZoom;
  const canvasY = (my - state.viewPanY) / state.viewZoom;
  // 缩放后重新计算平移，使鼠标下的点不变
  state.viewPanX = mx - canvasX * newZoom;
  state.viewPanY = my - canvasY * newZoom;
  state.viewZoom = newZoom;
  applyViewTransform();
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let y = 0; y < state.height; y++) {
    for (let x = 0; x < state.width; x++) {
      const c = state.pixels[y][x];
      if (c) {
        ctx.fillStyle = c;
        ctx.fillRect(x * state.pixelSize, y * state.pixelSize, state.pixelSize, state.pixelSize);
      }
    }
  }
  if (state.showGrid) drawGrid();
  else gridCtx.clearRect(0, 0, gridCanvas.width, gridCanvas.height);
  updateInfo();
}

function drawGrid() {
  gridCtx.clearRect(0, 0, gridCanvas.width, gridCanvas.height);
  if (state.pixelSize < 4) return; // 太小不画网格
  gridCtx.strokeStyle = 'rgba(255,255,255,0.08)';
  gridCtx.lineWidth = 1;
  for (let x = 0; x <= state.width; x++) {
    gridCtx.beginPath();
    gridCtx.moveTo(x * state.pixelSize + 0.5, 0);
    gridCtx.lineTo(x * state.pixelSize + 0.5, canvas.height);
    gridCtx.stroke();
  }
  for (let y = 0; y <= state.height; y++) {
    gridCtx.beginPath();
    gridCtx.moveTo(0, y * state.pixelSize + 0.5);
    gridCtx.lineTo(canvas.width, y * state.pixelSize + 0.5);
    gridCtx.stroke();
  }
}

function updateInfo() {
  const s = state.pixelSize;
  const z = Math.round(state.viewZoom * 100);
  document.getElementById('canvasInfo').textContent =
    `${state.width} \u00d7 ${state.height} \u2014 \u50cf\u7d20: ${s}x \u2014 \u89c6\u56fe: ${z}%`;
}

// ===== 历史记录 =====
function saveHistory() {
  // 截断当前位置之后的历史
  state.history = state.history.slice(0, state.historyIndex + 1);
  // 深拷贝像素数据
  const snapshot = state.pixels.map(row => [...row]);
  state.history.push(snapshot);
  if (state.history.length > state.maxHistory) {
    state.history.shift();
  }
  state.historyIndex = state.history.length - 1;
  updateHistoryUI();
}

function undo() {
  if (state.historyIndex > 0) {
    state.historyIndex--;
    state.pixels = state.history[state.historyIndex].map(row => [...row]);
    render();
    updateHistoryUI();
  }
}

function redo() {
  if (state.historyIndex < state.history.length - 1) {
    state.historyIndex++;
    state.pixels = state.history[state.historyIndex].map(row => [...row]);
    render();
    updateHistoryUI();
  }
}

function updateHistoryUI() {
  document.getElementById('undoBtn').disabled = state.historyIndex <= 0;
  document.getElementById('redoBtn').disabled = state.historyIndex >= state.history.length - 1;
  document.getElementById('historyInfo').textContent = `${state.historyIndex + 1} / ${state.history.length} \u6b65`;
}

// ===== 像素操作 =====
function getPixelPos(e) {
  const rect = viewport.getBoundingClientRect();
  // 屏幕坐标相对于 viewport
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  // 转换为 canvas 内容坐标（去掉平移和缩放）
  const cx = (mx - state.viewPanX) / state.viewZoom;
  const cy = (my - state.viewPanY) / state.viewZoom;
  const x = Math.floor(cx / state.pixelSize);
  const y = Math.floor(cy / state.pixelSize);
  return { x: Math.max(0, Math.min(x, state.width - 1)), y: Math.max(0, Math.min(y, state.height - 1)) };
}

function setPixel(x, y, color) {
  if (x >= 0 && x < state.width && y >= 0 && y < state.height) {
    state.pixels[y][x] = color;
  }
}

function getPixel(x, y) {
  if (x >= 0 && x < state.width && y >= 0 && y < state.height) {
    return state.pixels[y][x];
  }
  return undefined;
}

// 油漆桶（泛洪填充）
function floodFill(startX, startY, fillColor) {
  const targetColor = getPixel(startX, startY);
  if (targetColor === fillColor) return;
  const stack = [[startX, startY]];
  const visited = new Set();
  while (stack.length > 0) {
    const [x, y] = stack.pop();
    const key = `${x},${y}`;
    if (visited.has(key)) continue;
    if (x < 0 || x >= state.width || y < 0 || y >= state.height) continue;
    if (getPixel(x, y) !== targetColor) continue;
    visited.add(key);
    setPixel(x, y, fillColor);
    stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
  }
}

// Bresenham 直线
function drawLine(x0, y0, x1, y1, color) {
  const dx = Math.abs(x1 - x0), dy = Math.abs(y1 - y0);
  const sx = x0 < x1 ? 1 : -1, sy = y0 < y1 ? 1 : -1;
  let err = dx - dy;
  while (true) {
    setPixel(x0, y0, color);
    if (x0 === x1 && y0 === y1) break;
    const e2 = 2 * err;
    if (e2 > -dy) { err -= dy; x0 += sx; }
    if (e2 < dx) { err += dx; y0 += sy; }
  }
}

// 矩形轮廓
function drawRect(x0, y0, x1, y1, color) {
  const minX = Math.min(x0, x1), maxX = Math.max(x0, x1);
  const minY = Math.min(y0, y1), maxY = Math.max(y0, y1);
  for (let x = minX; x <= maxX; x++) { setPixel(x, minY, color); setPixel(x, maxY, color); }
  for (let y = minY; y <= maxY; y++) { setPixel(minX, y, color); setPixel(maxX, y, color); }
}

// 圆形轮廓 (Bresenham)
function drawCircle(cx, cy, ex, ey, color) {
  let r = Math.round(Math.sqrt((ex-cx)**2 + (ey-cy)**2));
  let x = r, y = 0, err = 1 - r;
  while (x >= y) {
    setPixel(cx+x, cy+y, color); setPixel(cx+y, cy+x, color);
    setPixel(cx-y, cy+x, color); setPixel(cx-x, cy+y, color);
    setPixel(cx-x, cy-y, color); setPixel(cx-y, cy-x, color);
    setPixel(cx+y, cy-x, color); setPixel(cx+x, cy-y, color);
    y++;
    if (err < 0) { err += 2*y + 1; }
    else { x--; err += 2*(y-x) + 1; }
  }
}

// ===== 事件处理 =====
// Alt+滚轮缩放
viewport.addEventListener('wheel', (e) => {
  if (!e.altKey) return;
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.85 : 1.18;
  zoomAtPoint(state.viewZoom * delta, e.clientX, e.clientY);
}, { passive: false });

// 中键拖拽平移
viewport.addEventListener('mousedown', (e) => {
  if (e.button === 1) { // 中键
    e.preventDefault();
    state.isPanning = true;
    state.panStartX = e.clientX;
    state.panStartY = e.clientY;
    state.panStartPanX = state.viewPanX;
    state.panStartPanY = state.viewPanY;
    viewport.classList.add('panning');
  }
});

window.addEventListener('mousemove', (e) => {
  if (state.isPanning) {
    state.viewPanX = state.panStartPanX + (e.clientX - state.panStartX);
    state.viewPanY = state.panStartPanY + (e.clientY - state.panStartY);
    applyViewTransform();
  }
});

window.addEventListener('mouseup', (e) => {
  if (e.button === 1 && state.isPanning) {
    state.isPanning = false;
    viewport.classList.remove('panning');
  }
});

// 禁止中键默认行为（有些浏览器会自动滚动）
viewport.addEventListener('auxclick', (e) => { if (e.button === 1) e.preventDefault(); });

function applyTool(x, y, isStart) {
  const color = state.tool === 'eraser' ? null : state.color;
  switch (state.tool) {
    case 'pencil':
    case 'eraser':
      setPixel(x, y, color);
      break;
    case 'fill':
      if (isStart) floodFill(x, y, color);
      break;
    case 'picker':
      if (isStart) {
        const picked = getPixel(x, y);
        if (picked) {
          state.color = picked;
          updateColorUI();
        }
      }
      break;
    case 'line':
    case 'rect':
    case 'circle':
      if (isStart) {
        state.shapeStart = { x, y };
        state.tempPixels = state.pixels.map(row => [...row]);
      } else if (state.shapeStart) {
        // 恢复到起点时的快照
        state.pixels = state.tempPixels.map(row => [...row]);
        if (state.tool === 'line') drawLine(state.shapeStart.x, state.shapeStart.y, x, y, color);
        else if (state.tool === 'rect') drawRect(state.shapeStart.x, state.shapeStart.y, x, y, color);
        else if (state.tool === 'circle') drawCircle(state.shapeStart.x, state.shapeStart.y, x, y, color);
      }
      break;
  }
  render();
}

// 连续画线（pencil/eraser 时在两点之间画线，避免快速移动漏点）
let lastDrawPos = null;

viewport.addEventListener('mousedown', (e) => {
  if (state.isPanning) return;
  if (e.button !== 0) return;
  state.drawing = true;
  const pos = getPixelPos(e);
  lastDrawPos = pos;
  applyTool(pos.x, pos.y, true);
});

viewport.addEventListener('mousemove', (e) => {
  if (state.isPanning) return;
  if (!state.drawing) return;
  const pos = getPixelPos(e);
  if (state.tool === 'pencil' || state.tool === 'eraser') {
    if (lastDrawPos) {
      const color = state.tool === 'eraser' ? null : state.color;
      drawLine(lastDrawPos.x, lastDrawPos.y, pos.x, pos.y, color);
      render();
    }
    lastDrawPos = pos;
  } else {
    applyTool(pos.x, pos.y, false);
  }
});

window.addEventListener('mouseup', (e) => {
  if (e.button === 0 && state.drawing) {
    state.drawing = false;
    state.shapeStart = null;
    state.tempPixels = null;
    lastDrawPos = null;
    saveHistory();
  }
});

// 触摸支持
viewport.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  const mouseEvent = new MouseEvent('mousedown', { clientX: touch.clientX, clientY: touch.clientY, button: 0 });
  viewport.dispatchEvent(mouseEvent);
});
viewport.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  const mouseEvent = new MouseEvent('mousemove', { clientX: touch.clientX, clientY: touch.clientY });
  viewport.dispatchEvent(mouseEvent);
});
viewport.addEventListener('touchend', (e) => {
  e.preventDefault();
  window.dispatchEvent(new MouseEvent('mouseup'));
});

function resize(w, h) {
  w = Math.max(4, Math.min(128, w));
  h = Math.max(4, Math.min(128, h));
  // 自动调整像素大小
  const maxCanvasSize = 512;
  state.pixelSize = Math.max(2, Math.min(32, Math.floor(maxCanvasSize / Math.max(w, h))));
  const oldPixels = state.pixels;
  const oldW = state.width, oldH = state.height;
  state.width = w;
  state.height = h;
  initPixels();
  // 复制旧数据
  for (let y = 0; y < Math.min(oldH, h); y++) {
    for (let x = 0; x < Math.min(oldW, w); x++) {
      state.pixels[y][x] = oldPixels[y][x];
    }
  }
  resizeCanvas(); // 内部会调用 centerView()
  saveHistory();
  render();
}

function exportPNG(scale) {
  const exportCanvas = document.createElement('canvas');
  exportCanvas.width = state.width * scale;
  exportCanvas.height = state.height * scale;
  const ectx = exportCanvas.getContext('2d');
  for (let y = 0; y < state.height; y++) {
    for (let x = 0; x < state.width; x++) {
      const c = state.pixels[y][x];
      if (c) {
        ectx.fillStyle = c;
        ectx.fillRect(x * scale, y * scale, scale, scale);
      }
    }
  }
  const link = document.createElement('a');
  link.download = `pixel-art-${state.width}x${state.height}${scale > 1 ? '-' + scale + 'x' : ''}.png`;
  link.href = exportCanvas.toDataURL('image/png');
  link.click();
}

(function() {

  function updatePosition() {

      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 2) { sp.x = sp.targetX; sp.y = sp.targetY; sp.targetX = sp.targetY = null; }

  });

  // 精灵上的 mousedown — 拖拽或点击
  sprite.addEventListener('mousedown', (e) => {

    if (!sp.dragging && !sp.menuOpen) {
      sp.wanderTimer += dt;
      if (sp.wanderTimer > 4000 + Math.random()*3000) {
        sp.wanderTimer = 0; wander();
        if (Math.random() < 0.3) say('idle');
      }
      updatePosition();
    }
    requestAnimationFrame(loop);
  }

  // 画完夸奖
  let drawCount = 0;
  viewport.addEventListener('mouseup', () => {
    drawCount++;
    if (drawCount % 8 === 0 && Math.random() < 0.5) { say('draw'); spawnParticles(3, '#feca57'); }
  });

  // 初始化
  sp.x = window.innerWidth - 100;
  sp.y = window.innerHeight - 120;
  sprite.style.left = sp.x + 'px';
  sprite.style.top = sp.y + 'px';
  drawSprite('normal');
  requestAnimationFrame(loop);
  setTimeout(() => say('click'), 1500);
  window.addEventListener('resize', () => {
    sp.x = Math.min(sp.x, window.innerWidth - 60);
    sp.y = Math.min(sp.y, window.innerHeight - 60);
    sprite.style.left = sp.x + 'px';
    sprite.style.top = sp.y + 'px';
  });

  // ===== 恐龙小游戏 =====
  const overlay = document.getElementById('dinoGameOverlay');
  const dinoCvs = document.getElementById('dinoCanvas');
  const dctx = dinoCvs.getContext('2d');
  const scoreEl = document.getElementById('dinoScore');
  const backBtn = document.getElementById('dinoBackBtn');

  let gameRunning = false, gameOver = false, score = 0, highScore = 0, animId = null;
  const GW = 600, GH = 200, GROUND_Y = 155, GRAVITY = 0.09, JUMP_FORCE = -5, SPEED0 = 0.5;
  let gameSpeed = SPEED0, obstacleTimer = 0, obstacleInterval = 250, groundOff = 0;
  let clouds = [], cloudTimer = 0;

  const dino = { x:60, y:GROUND_Y, w:30, h:36, vy:0, jumping:false };
  let obstacles = [];

  function drawDino() {
    const {x,y,w,h} = dino;
    dctx.fillStyle = '#a8d8ea';
    dctx.fillRect(x+4, y, w-8, h-8);
    dctx.fillRect(x+8, y-8, w-4, 12);
    dctx.fillStyle = '#1a1a2e';
    dctx.fillRect(x+w-8, y-4, 3, 3);
    dctx.fillRect(x+w-4, y, 4, 2);
    dctx.fillStyle = '#a8d8ea';
    if (!dino.jumping) {
      const f = Math.floor(Date.now()/100)%2;
      dctx.fillRect(x+6, y+h-(f?4:8), 6, f?4:8);
      dctx.fillRect(x+w-14, y+h-(f?8:4), 6, f?8:4);
    } else {
      dctx.fillRect(x+6, y+h-6, 6, 6);
      dctx.fillRect(x+w-14, y+h-6, 6, 6);
    }
    dctx.fillRect(x, y+4, 6, 6);
  }

  function drawCactus(cx, cy, type) {
    dctx.fillStyle = '#2ecc71';
    if (type===0) { dctx.fillRect(cx,cy,12,30); dctx.fillRect(cx-4,cy+8,4,10); dctx.fillRect(cx+12,cy+4,4,10); }
    else if (type===1) { dctx.fillRect(cx,cy,16,40); dctx.fillRect(cx-6,cy+10,6,14); dctx.fillRect(cx+16,cy+6,6,14); dctx.fillStyle='#27ae60'; dctx.fillRect(cx+2,cy,12,4); }
    else { dctx.fillRect(cx,cy+10,10,20); dctx.fillRect(cx+18,cy,10,30); dctx.fillRect(cx-3,cy+16,3,8); dctx.fillRect(cx+28,cy+6,3,10); }
    dctx.fillStyle='#27ae60'; dctx.fillRect(cx+2,cy+2,2,6);
  }

  function checkHit() {
    const dx=dino.x+4, dy=dino.y, dw=dino.w-8, dh=dino.h-4;
    for (const o of obstacles)
      if (dx<o.x+o.w && dx+dw>o.x && dy<o.y+o.h && dy+dh>o.y) return true;
    return false;
  }

  function resetGame() {
    dino.y=GROUND_Y; dino.vy=0; dino.jumping=false;
    obstacles=[]; clouds=[]; score=0; gameSpeed=SPEED0; obstacleInterval=250;
    obstacleTimer=0; gameOver=false;
    scoreEl.textContent = '得分: 0 | 最高: '+highScore;
  }

  function startGame() {
    if (gameRunning) return;
    gameRunning = true;
    resetGame();
    overlay.classList.add('show');
    sprite.style.display = 'none';
    hideMenu();
    gameLoop();
  }

  function exitGame() {
    gameRunning = false;
    if (animId) cancelAnimationFrame(animId);
    overlay.classList.remove('show');
    sprite.style.display = '';
  }

  function gameLoop() {
    if (!gameRunning) return;
    if (!gameOver) {
      dino.vy += GRAVITY; dino.y += dino.vy;
      if (dino.y >= GROUND_Y) { dino.y = GROUND_Y; dino.vy = 0; dino.jumping = false; }
      groundOff = (groundOff + gameSpeed) % 20;
      obstacleTimer++;
      if (obstacleTimer >= obstacleInterval) {
        obstacleTimer = 0;
        const t = Math.floor(Math.random()*3);
        let ow,oh;
        if(t===0){ow=12;oh=30;}else if(t===1){ow=16;oh=40;}else{ow=28;oh=30;}
        obstacles.push({x:620, y:GROUND_Y+dino.h-oh, w:ow, h:oh, type:t});
        obstacleInterval = Math.max(45, 250-Math.floor(score/80));
      }
      for (let i=obstacles.length-1;i>=0;i--) { obstacles[i].x-=gameSpeed; if(obstacles[i].x<-40) obstacles.splice(i,1); }
      cloudTimer++;
      if(cloudTimer>120){cloudTimer=0;clouds.push({x:620,y:30+Math.random()*60});}
      for(let i=clouds.length-1;i>=0;i--){clouds[i].x-=gameSpeed*0.3;if(clouds[i].x<-60)clouds.splice(i,1);}
      if(checkHit()){gameOver=true;if(score>highScore)highScore=score;scoreEl.textContent='游戏结束! 得分: '+score+' | 最高: '+highScore;}
      score++; gameSpeed=SPEED0+score*0.0005;
    }
    // draw
    dctx.clearRect(0,0,GW,GH);
    dctx.fillStyle='rgba(255,255,255,0.03)';
    for(let i=0;i<20;i++){dctx.fillRect((i*73+score*0.1)%GW,(i*37)%140+10,2,2);}
    dctx.fillStyle='rgba(255,255,255,0.08)';
    clouds.forEach(c=>{dctx.fillRect(c.x,c.y,40,10);dctx.fillRect(c.x+8,c.y-6,24,8);});
    dctx.strokeStyle='rgba(255,255,255,0.15)';dctx.lineWidth=1;
    dctx.beginPath();dctx.moveTo(0,GROUND_Y+dino.h+2);dctx.lineTo(GW,GROUND_Y+dino.h+2);dctx.stroke();
    dctx.fillStyle='rgba(255,255,255,0.05)';
    for(let gx=-groundOff;gx<GW;gx+=20)dctx.fillRect(gx,GROUND_Y+dino.h+4,10,2);
    obstacles.forEach(o=>drawCactus(o.x,o.y,o.type));
    drawDino();
    dctx.fillStyle='#666';dctx.font='14px Consolas,monospace';dctx.textAlign='right';
    dctx.fillText(String(score).padStart(5,'0'),GW-20,24);dctx.textAlign='left';
    if(gameOver){
      dctx.fillStyle='rgba(0,0,0,0.5)';dctx.fillRect(0,0,GW,GH);
      dctx.fillStyle='#ff6b6b';dctx.font='bold 28px "Microsoft YaHei",sans-serif';dctx.textAlign='center';
      dctx.fillText('游戏结束',300,75);
      dctx.fillStyle='#aaa';dctx.font='15px "Microsoft YaHei",sans-serif';dctx.fillText('得分: '+score,300,105);
      dctx.fillStyle='#666';dctx.font='13px "Microsoft YaHei",sans-serif';dctx.fillText('按空格键或点击重新开始',300,135);
      dctx.textAlign='left';
    }
    animId = requestAnimationFrame(gameLoop);
  }

  function jump() {
    if(gameOver){resetGame();return;}
    if(!dino.jumping){dino.vy=JUMP_FORCE;dino.jumping=true;}
  }

  // 菜单项点击
  menuDino.addEventListener('click', (e) => {
    e.stopPropagation();
    startGame();
  });

  backBtn.addEventListener('click', exitGame);

  document.addEventListener('keydown', (e) => {
    if(!gameRunning)return;
    if(e.code==='Space'||e.key===' '){e.preventDefault();jump();}
  });
  dinoCvs.addEventListener('click', () => { if(gameRunning) jump(); });
  overlay.addEventListener('keydown', e => e.stopPropagation());

})(); // 关闭陪伴精灵 IIFE
</script>
</body>
</html>
